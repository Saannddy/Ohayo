name: Release Ohayo

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine next version
        id: get-version
        run: |
          git fetch --tags
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "version=0.0.1" >> $GITHUB_OUTPUT
            exit 0
          fi
          sem=${latest#v}
          IFS=. read -r major minor patch <<< "$sem"
          if [ "$patch" -lt 9 ]; then
            patch=$((patch+1))
          else
            patch=0
            if [ "$minor" -lt 9 ]; then
              minor=$((minor+1))
            else
              minor=0
              major=$((major+1))
            fi
          fi
          echo "version=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT

  build-macos:
    needs: determine-version
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Import macOS signing certificate
        if: env.MACOS_CERTIFICATE != ''
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > macos-cert.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import macos-cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
      - name: Build macOS app
        run: |
          rm -rf build/ dist/ *.spec
          pyinstaller --onedir --windowed --name "おはよう" --icon=images/icon.png app.py
      - name: Sign macOS app
        if: env.MACOS_SIGNING_IDENTITY != ''
        run: |
          codesign --force --deep --options runtime --sign "$MACOS_SIGNING_IDENTITY" "dist/おはよう.app"
          codesign --verify --deep --strict --verbose=2 "dist/おはよう.app"
      - name: Notarize macOS app
        if: env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: |
          xcrun notarytool submit "dist/おはよう.app" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "dist/おはよう.app"
      - name: Package macOS release
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/おはよう.app" "dist/Ohayo-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ohayo-macos
          path: dist/Ohayo-macos.zip

  build-windows:
    needs: determine-version
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build Windows app
        shell: cmd
        run: |
          build_windows.bat
      - name: Sign Windows app
        if: env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          [System.IO.File]::WriteAllBytes('windows-cert.pfx', [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          signtool sign /f windows-cert.pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist\Ohayo.exe
          signtool verify /pa dist\Ohayo.exe
      - name: Package Windows release
        shell: pwsh
        run: |
          Compress-Archive -Path 'dist\Ohayo.exe' -DestinationPath 'dist\Ohayo-windows.zip' -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ohayo-windows
          path: dist/Ohayo-windows.zip

  release:
    needs: [determine-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ohayo-macos
          path: release-artifacts
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ohayo-windows
          path: release-artifacts
      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.determine-version.outputs.version }}
          release_name: "おはよう ${{ needs.determine-version.outputs.version }}"
          body: |
            Release ${{ needs.determine-version.outputs.version }} containing macOS and Windows application packages.
          draft: false
          prerelease: false
      - name: Upload macOS asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/Ohayo-macos.zip
          asset_name: Ohayo-macos.zip
          asset_content_type: application/zip
      - name: Upload Windows asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/Ohayo-windows.zip
          asset_name: Ohayo-windows.zip
          asset_content_type: application/zip
