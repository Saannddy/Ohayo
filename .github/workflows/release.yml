name: Release Ohayo

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine next version
        id: get-version
        run: |
          git fetch --tags
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "version=0.0.1" >> $GITHUB_OUTPUT
            exit 0
          fi
          sem=${latest#v}
          IFS=. read -r major minor patch <<< "$sem"
          if [ "$patch" -lt 9 ]; then
            patch=$((patch+1))
          else
            patch=0
            if [ "$minor" -lt 9 ]; then
              minor=$((minor+1))
            else
              minor=0
              major=$((major+1))
            fi
          fi
          echo "version=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT

  build-macos:
    needs: determine-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build macOS app
        run: |
          rm -rf build/ dist/ *.spec
          pyinstaller --onedir --windowed --name "おはよう" --icon=icon.png app.py
          ditto -c -k --sequesterRsrc --keepParent "dist/おはよう.app" "dist/Ohayo-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ohayo-macos
          path: dist/Ohayo-macos.zip

  build-windows:
    needs: determine-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build Windows app
        shell: cmd
        run: |
          build_windows.bat
      - uses: actions/upload-artifact@v4
        with:
          name: ohayo-windows
          path: dist/Ohayo.exe

  release:
    needs: [determine-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ohayo-macos
          path: release-artifacts
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ohayo-windows
          path: release-artifacts
      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ needs.determine-version.outputs.version }}
          release_name: "おはよう ${{ needs.determine-version.outputs.version }}"
          body: |
            Release ${{ needs.determine-version.outputs.version }} containing macOS and Windows application packages.
          draft: false
          prerelease: false
      - name: Upload macOS asset
        uses: actions/upload-release-asset@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/Ohayo-macos.zip
          asset_name: Ohayo-macos.zip
          asset_content_type: application/zip
      - name: Upload Windows asset
        uses: actions/upload-release-asset@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/Ohayo.exe
          asset_name: Ohayo.exe
          asset_content_type: application/octet-stream
